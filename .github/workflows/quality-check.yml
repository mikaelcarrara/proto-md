name: Quality Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Syntax check
        run: python -m py_compile parser.py validator.py cli.py test_mvp.py

      - name: Unit tests
        run: python -m unittest -v

      - name: CLI smoke test valid protocol
        run: |
          python cli.py protocols/valid_protocol.md --format json
          python cli.py protocols/valid_protocol.md --strict --format compact

      - name: CLI exit-code contract for invalid protocol
        run: python -c "import subprocess,sys; r=subprocess.run([sys.executable,'cli.py','protocols/invalid_protocol.md','--format','compact']); raise SystemExit(0 if r.returncode==1 else 1)"
